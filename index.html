<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0d">
<title>CW Payroll Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #141414; --surface2: #1a1a1a; --border: #2a2a2a;
    --orange: #FFD000; --orange-dim: rgba(255,208,0,0.1);
    --text: #f0f0f0; --muted: #888;
    --green: #4ade80; --red: #f87171; --yellow: #FFD000; --blue: #60a5fa;
    --heading: 'Bebas Neue', sans-serif;
    --font: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

  /* ── LOGIN ── */
  #loginScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .login-wrap { width: 100%; max-width: 400px; }
  .admin-logo { margin-bottom: 2.5rem; }
  .admin-logo .cw { font-family: var(--heading); font-size: 3.5rem; color: var(--orange); letter-spacing: 2px; line-height: 1; }
  .admin-logo .sub { font-family: var(--heading); font-size: 1.1rem; letter-spacing: 6px; text-transform: uppercase; color: var(--muted); margin-top: 0.25rem; }
  .admin-logo .tag { display: inline-block; background: var(--orange-dim); border: 1px solid var(--orange); color: var(--orange); font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 4px; margin-top: 0.5rem; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2rem; }
  .login-card h2 { font-family: var(--heading); font-size: 1.8rem; letter-spacing: 1px; font-weight: 400; margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 1rem; padding: 0.75rem 1rem; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--orange); }
  .btn-primary { width: 100%; background: var(--orange); color: #0d0d0d; border: none; border-radius: 4px; font-family: var(--heading); font-size: 1.2rem; letter-spacing: 1px; padding: 0.85rem; cursor: pointer; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.9; }
  .err { color: var(--red); font-size: 0.85rem; margin-top: 0.75rem; display: none; }

  /* ── APP SHELL ── */
  #adminApp { display: none; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.85rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
  .topbar-logo { font-family: var(--heading); color: var(--orange); font-size: 1.6rem; letter-spacing: 2px; }
  .topbar-title { font-family: var(--heading); font-size: 1rem; letter-spacing: 2px; color: var(--muted); }
  .topbar-actions { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .btn-sm { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: var(--font); font-size: 0.8rem; font-weight: 500; padding: 0.45rem 1rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-sm:hover { border-color: var(--orange); color: var(--orange); }
  .btn-export { background: var(--orange); border: none; color: #0d0d0d; border-radius: 4px; font-family: var(--heading); font-size: 1rem; letter-spacing: 1px; padding: 0.45rem 1.25rem; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
  .btn-export:hover { opacity: 0.85; }

  /* ── FILTER BAR ── */
  .filter-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
  .filter-bar select, .filter-bar input[type=week] { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 0.85rem; padding: 0.4rem 0.75rem; outline: none; color-scheme: dark; }
  .filter-bar select option { background: var(--surface2); }

  /* ── STATS BAR ── */
  .stats { display: flex; gap: 1.25rem; margin-left: auto; flex-wrap: wrap; align-items: center; }
  .stat { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
  .stat b { font-family: var(--heading); font-size: 1rem; letter-spacing: 1px; color: var(--orange); }
  .stat-divider { width: 1px; height: 18px; background: var(--border); }
  .stat-deducted b { color: var(--red); }

  /* ── TABLE ── */
  .table-wrap { flex: 1; overflow-x: auto; padding: 1.25rem 1.5rem; }
  table { width: 100%; border-collapse: collapse; min-width: 1100px; }
  thead th { text-align: left; font-family: var(--heading); font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--orange); }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.15s; }
  tbody tr:hover { background: var(--surface); }
  tbody tr.saved-flash { background: rgba(255,208,0,0.08) !important; }
  td { padding: 0.75rem 0.75rem; font-size: 0.88rem; vertical-align: middle; }

  /* Staff cell */
  .td-staff { font-weight: 600; }
  .td-staff .submitted-at { font-size: 0.68rem; color: var(--muted); font-weight: 400; margin-top: 2px; }

  /* Editable inputs */
  .td-hours input { font-family: var(--heading); font-size: 1.1rem; letter-spacing: 1px; color: var(--orange); background: var(--surface2); border: 1px solid transparent; border-radius: 4px; width: 65px; padding: 0.25rem 0.4rem; outline: none; }
  .td-hours input:focus { border-color: var(--orange); }
  .td-note input { background: var(--surface2); border: 1px solid transparent; border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 0.82rem; padding: 0.25rem 0.5rem; width: 150px; outline: none; }
  .td-note input:focus { border-color: var(--orange); }
  .td-date input[type=date], .td-time input[type=time] {
    background: var(--surface2); border: 1px solid transparent; border-radius: 4px;
    color: var(--text); font-family: var(--font); font-size: 0.82rem;
    padding: 0.25rem 0.4rem; outline: none; color-scheme: dark; cursor: pointer;
  }
  .td-date input[type=date] { width: 130px; }
  .td-time input[type=time] { width: 88px; }
  .td-date input:focus, .td-time input:focus { border-color: var(--orange); }
  .td-date input:hover, .td-time input:hover { border-color: var(--border); }

  /* Breaks cell */
  .td-breaks { font-size: 0.78rem; color: var(--muted); }
  .td-breaks .break-math { font-size: 0.7rem; margin-top: 4px; color: var(--muted); }
  .td-breaks .break-math .paid { color: var(--orange); font-family: var(--heading); font-size: 0.9rem; letter-spacing: 1px; }

  /* Staff notes cell */
  .td-staff-notes { font-size: 0.8rem; color: var(--muted); font-style: italic; max-width: 160px; }

  /* Badges */
  .badge { display: inline-block; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 4px; font-weight: 700; }
  .badge-pending  { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  .badge-approved { background: rgba(74,222,128,0.1);  color: var(--green);  border: 1px solid rgba(74,222,128,0.3); }

  /* Action buttons */
  .btn-approve { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--green); border-radius: 4px; font-family: var(--heading); font-size: 0.9rem; letter-spacing: 1px; padding: 0.3rem 0.75rem; cursor: pointer; transition: all 0.15s; }
  .btn-approve:hover { background: rgba(74,222,128,0.2); }
  .btn-undo { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 4px; font-size: 0.75rem; padding: 0.3rem 0.6rem; cursor: pointer; font-family: var(--font); }
  .btn-undo:hover { border-color: var(--yellow); color: var(--yellow); }
  .btn-delete { background: none; border: 1px solid rgba(248,113,113,0.25); color: var(--red); border-radius: 4px; font-size: 0.75rem; padding: 0.3rem 0.5rem; cursor: pointer; font-family: var(--font); opacity: 0.6; transition: all 0.15s; }
  .btn-delete:hover { opacity: 1; background: rgba(248,113,113,0.1); border-color: var(--red); }
  .action-cell { display: flex; gap: 0.3rem; align-items: center; }

  .empty-row td { text-align: center; color: var(--muted); padding: 3rem; }
  .loading-row td { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.85rem; }

  /* Toast */
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1.25rem; font-size: 0.9rem; opacity: 0; transition: all 0.3s; z-index: 100; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-wrap">
    <div class="admin-logo">
      <div class="cw">CW</div>
      <div class="sub">Payroll Admin</div>
      <div class="tag">Admin access only</div>
    </div>
    <div class="login-card">
      <h2>Admin Login</h2>
      <div class="field"><label>Username</label><input type="text" id="adminUser" placeholder="admin" autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="adminPass" placeholder="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
      <button class="btn-primary" onclick="doAdminLogin()">Login →</button>
      <div class="err" id="adminErr">Incorrect credentials.</div>
    </div>
  </div>
</div>

<div id="adminApp">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">CW</span>
      <span class="topbar-title">Payroll Review</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-sm" onclick="loadEntries()" id="refreshBtn">↻ Refresh</button>
      <button class="btn-sm" onclick="approveAll()">✓ Approve All Pending</button>
      <button class="btn-export" onclick="exportSmartly()">Export Smartly CSV</button>
      <button class="btn-sm" onclick="doAdminLogout()">Logout</button>
    </div>
  </div>

  <div class="filter-bar">
    <select id="filterStaff" onchange="renderTable()"><option value="">All staff</option></select>
    <select id="filterStatus" onchange="renderTable()">
      <option value="">All status</option>
      <option value="pending">Pending only</option>
      <option value="approved">Approved only</option>
    </select>
    <input type="week" id="filterWeek" onchange="renderTable()" title="Filter by week">
    <button class="btn-sm" onclick="clearFilters()">Clear</button>
    <div class="stats" id="statsRow"></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('staff')">Staff</th>
          <th onclick="sortBy('date')">Date</th>
          <th>Start</th>
          <th>Finish</th>
          <th onclick="sortBy('paid_hours')">Paid Hrs</th>
          <th>Breaks &amp; Hours</th>
          <th>Job / Site</th>
          <th>Staff Notes</th>
          <th>Payroll Note</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://baojgmrlwunizgcauyhl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhb2pnbXJsd3VuaXpnY2F1eWhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDYwODAsImV4cCI6MjA5NTIyMjA4MH0.XPvjOWlgWkK5YWUax47aDvMS1V6Dbf4LERqI5Yht1r8';
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'corpworks2026';

let allEntries = [];
let sortCol = 'date';
let sortDir = -1;

// ── SUPABASE ──
const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json'
};

async function dbFetchAll() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/timesheets?order=date.desc,submitted_at.desc`, { headers });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function dbUpdate(id, fields) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/timesheets?id=eq.${id}`, {
    method: 'PATCH',
    headers: { ...headers, 'Prefer': 'return=minimal' },
    body: JSON.stringify(fields)
  });
  if (!res.ok) throw new Error(await res.text());
}

async function dbDelete(id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/timesheets?id=eq.${id}`, {
    method: 'DELETE',
    headers: { ...headers, 'Prefer': 'return=minimal' }
  });
  if (!res.ok) throw new Error(await res.text());
}

// ── AUTH ──
function doAdminLogin() {
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    sessionStorage.setItem('cwadmin', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'flex';
    loadEntries();
  } else {
    document.getElementById('adminErr').style.display = 'block';
  }
}

function doAdminLogout() {
  sessionStorage.removeItem('cwadmin');
  location.reload();
}

// ── LOAD ──
async function loadEntries() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ Loading…';
  try {
    allEntries = await dbFetchAll();
    populateStaffFilter();
    renderTable();
    toast(`${allEntries.length} entries loaded`, 'success');
  } catch(e) {
    toast('Failed to load: ' + e.message, 'error');
  } finally {
    btn.textContent = '↻ Refresh';
  }
}

function populateStaffFilter() {
  const staff = [...new Set(allEntries.map(e => e.staff || ''))].sort();
  const sel = document.getElementById('filterStaff');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All staff</option>' + staff.map(s => `<option${s === cur ? ' selected' : ''}>${s}</option>`).join('');
}

// ── FILTER + SORT ──
function getFiltered() {
  const fs  = document.getElementById('filterStaff').value;
  const fst = document.getElementById('filterStatus').value;
  const fw  = document.getElementById('filterWeek').value;
  return allEntries.filter(e => {
    if (fs && e.staff !== fs) return false;
    if (fst && e.status !== fst) return false;
    if (fw) {
      const d = new Date((e.date || '') + 'T12:00:00');
      if (getISOWeek(d) !== parseInt((fw.split('W')[1]) || 0)) return false;
      if (d.getFullYear() !== parseInt(fw.split('-W')[0] || 0)) return false;
    }
    return true;
  }).sort((a, b) => {
    let av = a[sortCol] || '', bv = b[sortCol] || '';
    if (sortCol === 'paid_hours') { av = parseFloat(av) || 0; bv = parseFloat(bv) || 0; }
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });
}

// ── BREAK / HOUR HELPER ──
function getBreakInfo(e) {
  const breakMins = (e.morning_break || 10) + (e.lunch_break || 30) + (e.afternoon_break || 10);
  const icons = `☕${e.morning_break || 10}m &middot; 🥪${e.lunch_break || 30}m &middot; 🍵${e.afternoon_break || 10}m`;
  let math = '';
  if (e.start_time && e.end_time) {
    const [sh, sm] = e.start_time.split(':').map(Number);
    const [eh, em] = e.end_time.split(':').map(Number);
    const grossMins = (eh * 60 + em) - (sh * 60 + sm);
    if (grossMins > 0) {
      const grossHrs = (grossMins / 60).toFixed(1);
      const paid = parseFloat(e.paid_hours || 0).toFixed(1);
      math = `<div class="break-math">${grossHrs}h gross &minus; ${breakMins}m = <span class="paid">${paid}h paid</span></div>`;
    }
  }
  return icons + math;
}

// ── FORMAT HELPERS ──
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-NZ', { weekday: 'short', day: 'numeric', month: 'short' });
}

function fmtSubmitted(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('en-NZ', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
}

// ── RENDER ──
function renderTable() {
  const filtered = getFiltered();
  const pending  = filtered.filter(e => e.status === 'pending');
  const totalPaid = filtered.reduce((s, e) => s + (parseFloat(e.paid_hours) || 0), 0);

  // Gross hours total from start/finish
  const totalGross = filtered.reduce((s, e) => {
    if (!e.start_time || !e.end_time) return s;
    const [sh, sm] = e.start_time.split(':').map(Number);
    const [eh, em] = e.end_time.split(':').map(Number);
    const m = (eh * 60 + em) - (sh * 60 + sm);
    return s + (m > 0 ? m / 60 : 0);
  }, 0);
  const totalDeducted = totalGross - totalPaid;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat">Showing <b>${filtered.length}</b></div>
    <div class="stat">Pending <b>${pending.length}</b></div>
    <div class="stat-divider"></div>
    <div class="stat">Gross hrs <b>${totalGross.toFixed(1)}</b></div>
    <div class="stat stat-deducted">Breaks <b>−${totalDeducted > 0 ? totalDeducted.toFixed(1) : '0.0'}h</b></div>
    <div class="stat">Paid hrs <b>${totalPaid.toFixed(1)}</b></div>
  `;

  const body = document.getElementById('tableBody');
  if (!filtered.length) {
    body.innerHTML = '<tr class="empty-row"><td colspan="11">No entries. Staff submit from their phones — hit Refresh to check.</td></tr>';
    return;
  }

  body.innerHTML = filtered.map(e => {
    const safeStaff = (e.staff || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    return `
    <tr data-id="${e.id}">
      <td class="td-staff">
        ${e.staff || '—'}
        ${e.submitted_at ? `<div class="submitted-at">submitted ${fmtSubmitted(e.submitted_at)}</div>` : ''}
      </td>
      <td class="td-date">
        <input type="date" value="${e.date || ''}"
          onchange="updateField(${e.id}, 'date', this.value)">
      </td>
      <td class="td-time">
        <input type="time" value="${e.start_time || ''}"
          onchange="updateTime(${e.id}, 'start_time', this.value)">
      </td>
      <td class="td-time">
        <input type="time" value="${e.end_time || ''}"
          onchange="updateTime(${e.id}, 'end_time', this.value)">
      </td>
      <td class="td-hours">
        <input type="number" step="0.5" min="0" max="24" value="${e.paid_hours || 0}"
          onchange="updateField(${e.id}, 'paid_hours', +this.value)">
      </td>
      <td class="td-breaks">${getBreakInfo(e)}</td>
      <td style="font-size:0.85rem;">${e.job || '—'}</td>
      <td class="td-staff-notes">${e.notes || '—'}</td>
      <td class="td-note">
        <input type="text" placeholder="add note…" value="${(e.payroll_note || '').replace(/"/g, '&quot;')}"
          onchange="updateField(${e.id}, 'payroll_note', this.value)">
      </td>
      <td><span class="badge badge-${e.status}">${e.status}</span></td>
      <td>
        <div class="action-cell">
          ${e.status === 'pending'
            ? `<button class="btn-approve" onclick="approve(${e.id})">✓ Approve</button>`
            : `<button class="btn-undo" onclick="unapprove(${e.id})">Undo</button>`}
          <button class="btn-delete" onclick="deleteEntry(${e.id}, '${safeStaff}', '${e.date || ''}')" title="Delete entry">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function sortBy(col) {
  sortCol === col ? sortDir *= -1 : (sortCol = col, sortDir = 1);
  renderTable();
}

function clearFilters() {
  document.getElementById('filterStaff').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterWeek').value = '';
  renderTable();
}

// ── FLASH ROW ──
function flashRow(id) {
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (!row) return;
  row.classList.add('saved-flash');
  setTimeout(() => row.classList.remove('saved-flash'), 1000);
}

// ── REVERT APPROVED TO PENDING (in-place, no full re-render) ──
async function revertToPendingIfApproved(entry) {
  if (entry.status !== 'approved') return true;
  const ok = confirm(`This entry is approved.\n\nEditing will revert it to Pending — you'll need to re-approve before it can be exported.\n\nContinue?`);
  if (!ok) return false;
  try {
    await dbUpdate(entry.id, { status: 'pending', approved_at: null });
    entry.status = 'pending';
    entry.approved_at = null;
    // Update badge and action button in-place
    const row = document.querySelector(`tr[data-id="${entry.id}"]`);
    if (row) {
      const badge = row.querySelector('.badge');
      if (badge) { badge.className = 'badge badge-pending'; badge.textContent = 'pending'; }
      const actionCell = row.querySelector('.action-cell');
      if (actionCell) {
        actionCell.innerHTML = `
          <button class="btn-approve" onclick="approve(${entry.id})">✓ Approve</button>
          <button class="btn-delete" onclick="deleteEntry(${entry.id}, '${(entry.staff||'').replace(/'/g,"\\'")}', '${entry.date||''}')" title="Delete entry">🗑</button>
        `;
      }
    }
    toast('Reverted to pending', 'success');
    return true;
  } catch(e) {
    toast('Failed to revert: ' + e.message, 'error');
    return false;
  }
}

// ── EDIT FIELDS ──
async function updateField(id, field, value) {
  const entry = allEntries.find(e => e.id == id);
  if (!entry) return;
  if (!(await revertToPendingIfApproved(entry))) {
    // User cancelled — reload entries to reset the input value
    renderTable();
    return;
  }
  entry[field] = value;
  try {
    await dbUpdate(id, { [field]: value });
    flashRow(id);
  } catch(e) {
    toast('Save failed: ' + e.message, 'error');
  }
}

// ── UPDATE TIME + AUTO-RECALC PAID HOURS ──
async function updateTime(id, field, value) {
  const entry = allEntries.find(e => e.id == id);
  if (!entry) return;
  if (!(await revertToPendingIfApproved(entry))) {
    renderTable();
    return;
  }
  entry[field] = value;
  try {
    await dbUpdate(id, { [field]: value });

    // Recalculate paid hours from start + end + breaks
    if (entry.start_time && entry.end_time) {
      const [sh, sm] = entry.start_time.split(':').map(Number);
      const [eh, em] = entry.end_time.split(':').map(Number);
      const totalMins = (eh * 60 + em) - (sh * 60 + sm);
      if (totalMins > 0) {
        const breakMins = (entry.morning_break || 10) + (entry.lunch_break || 30) + (entry.afternoon_break || 10);
        const paidMins = Math.max(0, totalMins - breakMins);
        const paidHrs = Math.round(paidMins / 60 * 2) / 2; // nearest 0.5h
        entry.paid_hours = paidHrs;
        await dbUpdate(id, { paid_hours: paidHrs });
        // Update hours input and break math in-place
        const row = document.querySelector(`tr[data-id="${id}"]`);
        if (row) {
          const hoursInput = row.querySelector('.td-hours input');
          if (hoursInput) hoursInput.value = paidHrs;
          const breaksCell = row.querySelector('.td-breaks');
          if (breaksCell) breaksCell.innerHTML = getBreakInfo(entry);
        }
        toast(`Hours → ${paidHrs}h (${(totalMins/60).toFixed(1)}h gross − ${breakMins}m breaks)`, 'success');
      }
    }
    flashRow(id);
  } catch(e) {
    toast('Save failed: ' + e.message, 'error');
  }
}

// ── DELETE ──
async function deleteEntry(id, staff, date) {
  const label = staff && date ? `${staff} on ${fmtDate(date)}` : `entry #${id}`;
  if (!confirm(`Delete entry for ${label}?\n\nThis cannot be undone.`)) return;
  try {
    await dbDelete(id);
    allEntries = allEntries.filter(e => e.id != id);
    renderTable();
    toast('Entry deleted', 'success');
  } catch(e) {
    toast('Delete failed: ' + e.message, 'error');
  }
}

// ── APPROVE ──
async function approve(id) {
  const entry = allEntries.find(e => e.id == id);
  if (!entry) return;
  const updates = { status: 'approved', approved_at: new Date().toISOString() };
  try {
    await dbUpdate(id, updates);
    Object.assign(entry, updates);
    renderTable();
    toast('Approved ✓', 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function unapprove(id) {
  const entry = allEntries.find(e => e.id == id);
  if (!entry) return;
  try {
    await dbUpdate(id, { status: 'pending', approved_at: null });
    entry.status = 'pending'; entry.approved_at = null;
    renderTable();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function approveAll() {
  const pending = getFiltered().filter(e => e.status === 'pending');
  if (!pending.length) { toast('No pending entries in current view', 'error'); return; }
  if (!confirm(`Approve all ${pending.length} pending entries?`)) return;
  const now = new Date().toISOString();
  for (const e of pending) {
    try { await dbUpdate(e.id, { status: 'approved', approved_at: now }); e.status = 'approved'; e.approved_at = now; } catch{}
  }
  renderTable();
  toast(`Approved ${pending.length} entries ✓`, 'success');
}

// ── SMARTLY EXPORT ──
function exportSmartly() {
  const approved = allEntries.filter(e => e.status === 'approved');
  if (!approved.length) { toast('No approved entries to export', 'error'); return; }
  const rows = [['Employee Name', 'Date', 'Start Time', 'End Time', 'Ordinary Hours', 'Notes']];
  approved.forEach(e => {
    rows.push([
      e.staff || '',
      e.date || '',
      e.start_time || '',
      e.end_time || '',
      e.paid_hours || '',
      [e.job, e.payroll_note, e.notes].filter(Boolean).join(' | ')
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `smartly_${new Date().toISOString().split('T')[0]}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast(`Exported ${approved.length} approved entries ✓`, 'success');
}

function getISOWeek(d) {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  return Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => el.className = 'toast', 3500);
}

window.onload = () => {
  if (sessionStorage.getItem('cwadmin')) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'flex';
    loadEntries();
  }
};
