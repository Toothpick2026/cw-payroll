<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CW Payroll">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Corpworks Payroll Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#22223a;--surface3:#2a2a48;--border:#2e2e50;--border2:#3d3d6a;--text:#f0eeff;--text2:#9999cc;--text3:#55556a;--accent:#4f46e5;--accent2:#3d35c0;--accent-dim:rgba(79,70,229,.15);--green:#4caf82;--green-dim:rgba(76,175,130,.15);--red:#e05c5c;--red-dim:rgba(224,92,92,.15);--yellow:#d4a843;--yellow-dim:rgba(212,168,67,.15);--orange:#E07B3C;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--font:'Barlow',sans-serif;--font-cond:'Barlow Condensed',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;max-width:920px;margin:0 auto}
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:40px 36px;width:100%;max-width:400px;text-align:center}
.login-badge{width:72px;height:72px;background:var(--accent);border-radius:18px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-family:var(--font-cond);font-weight:800;font-size:28px;color:#fff}
.login-title{font-family:var(--font-cond);font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.login-field{margin-bottom:16px;text-align:left}
.login-label{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:17px;font-weight:600;padding:14px 16px;border-radius:12px;outline:none;-webkit-appearance:none}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:var(--font-cond);font-size:20px;font-weight:800;cursor:pointer;margin-top:8px}
.login-btn:hover{background:var(--accent2)}
.login-error{color:var(--red);font-size:13px;margin-top:10px;font-weight:600;min-height:20px}
.app-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 20px 0;position:sticky;top:0;z-index:100}
.bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-badge{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-cond);font-weight:800;font-size:15px;color:#fff}
.brand-name{font-family:var(--font-cond);font-weight:800;font-size:17px;color:var(--text);letter-spacing:.04em;text-transform:uppercase}
.brand-sub{font-size:10px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.bar-right{display:flex;align-items:center;gap:10px}
.logout-btn{padding:8px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;font-family:var(--font-cond);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer}
.logout-btn:hover{color:var(--red)}
.live-time{font-family:var(--font-cond);font-size:16px;font-weight:700;color:var(--text2)}
.tabs{display:flex;border-top:1px solid var(--border);margin-top:2px}
.tab{flex:1;padding:10px 6px;font-family:var(--font-cond);font-size:12px;font-weight:700;color:var(--text3);background:none;border:none;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s;position:relative;top:1px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none;overflow-y:auto;padding-bottom:40px}
.page.active{display:block}
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.scard-val{font-family:var(--font-cond);font-size:28px;font-weight:800;color:var(--text)}
.scard-val.green{color:var(--green)}.scard-val.yellow{color:var(--yellow)}.scard-val.orange{color:var(--orange)}.scard-val.accent{color:var(--accent)}
.scard-lbl{font-size:10px;color:var(--text2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.filter-bar{padding:0 20px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-family:var(--font-cond);font-size:13px;font-weight:700;cursor:pointer}
.filter-pill.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.search-input{flex:1;min-width:140px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:14px;padding:8px 14px;border-radius:20px;outline:none}
.search-input:focus{border-color:var(--accent)}
.export-all-btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:20px;font-family:var(--font-cond);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.import-btn{padding:8px 16px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,70,229,.3);border-radius:20px;font-family:var(--font-cond);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.subs-wrap{padding:0 20px;display:flex;flex-direction:column;gap:12px}
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.sub-card.approved{border-left:4px solid var(--green)}
.sub-card.pending{border-left:4px solid var(--yellow)}
.sub-card.queried{border-left:4px solid var(--red)}
.sub-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px}
.sub-head-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.tech-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-cond);font-size:18px;font-weight:800;color:#fff;flex-shrink:0}
.sub-info{flex:1;min-width:0}
.sub-tech{font-family:var(--font-cond);font-size:20px;font-weight:800;color:var(--text)}
.sub-week{font-size:13px;color:var(--text2);margin-top:2px}
.sub-head-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.status-badge{font-size:11px;padding:4px 10px;border-radius:20px;font-family:var(--font-cond);font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge-pending{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(212,168,67,.3)}
.badge-approved{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,130,.3)}
.badge-queried{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,92,92,.3)}
.chevron{font-size:18px;color:var(--text3);transition:transform .2s;display:inline-block}
.sub-card.open .chevron{transform:rotate(180deg)}
.sub-body{display:none;padding:18px}
.sub-card.open .sub-body{display:block}
.sub-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.sub-stat{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
.sub-stat-val{font-family:var(--font-cond);font-size:22px;font-weight:800;color:var(--text)}
.sub-stat-val.green{color:var(--green)}.sub-stat-val.yellow{color:var(--yellow)}.sub-stat-val.accent{color:var(--accent)}
.sub-stat-lbl{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.clock-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.clock-item{font-size:13px;color:var(--text2)}
.clock-item span{color:var(--text);font-weight:700}
.jobs-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
.jobs-table th{text-align:left;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:8px 8px;border-bottom:1px solid var(--border)}
.jobs-table td{padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
.jobs-table tr:last-child td{border-bottom:none}
.edit-hrs{width:46px;text-align:center;background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-family:var(--font-cond);font-size:15px;font-weight:700;padding:5px 3px;border-radius:6px;outline:none}
.edit-hrs:focus{border-color:var(--accent)}
.edit-hrs::-webkit-inner-spin-button,.edit-hrs::-webkit-outer-spin-button{-webkit-appearance:none}
.field-label{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.admin-notes{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:14px;padding:12px;border-radius:10px;outline:none;resize:vertical;min-height:70px;margin-bottom:16px}
.admin-notes:focus{border-color:var(--accent)}
.action-row{display:flex;gap:8px;flex-wrap:wrap}
.act-btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:var(--font-cond);font-size:15px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;min-width:100px}
.act-btn:active{transform:scale(.97)}
.btn-approve{background:var(--green);color:#fff}
.btn-query{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,92,92,.3)}
.btn-query:hover{background:var(--red);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:hover{color:var(--text)}
.btn-unapprove{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(212,168,67,.3)}
.btn-danger{background:none;color:var(--red);border:1px solid rgba(224,92,92,.3)}
.payroll-section{padding:20px}
.payroll-week{margin-bottom:24px}
.payroll-week-title{font-family:var(--font-cond);font-size:15px;font-weight:800;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.payroll-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px}
.payroll-tech{font-family:var(--font-cond);font-size:18px;font-weight:800;color:var(--text)}
.payroll-meta{font-size:12px;color:var(--text2);margin-top:2px}
.payroll-hrs{font-family:var(--font-cond);font-size:22px;font-weight:800;color:var(--green)}
.payroll-amt{font-family:var(--font-cond);font-size:20px;font-weight:800;color:var(--accent)}
.settings-section{padding:20px;display:flex;flex-direction:column;gap:16px}
.setting-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px}
.setting-title{font-family:var(--font-cond);font-size:16px;font-weight:800;color:var(--text);margin-bottom:14px}
.setting-input{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:16px;padding:12px 14px;border-radius:10px;outline:none;margin-bottom:10px}
.setting-input:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:6px 14px;font-size:14px;font-weight:600;color:var(--text2)}
.chip button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0;line-height:1}
.chip button:hover{color:var(--red)}
.add-row{display:flex;gap:8px}
.add-row input{flex:1;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:15px;padding:10px 14px;border-radius:10px;outline:none}
.add-row input:focus{border-color:var(--accent)}
.add-row button,.pw-btn{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--font-cond);font-size:15px;font-weight:800;cursor:pointer}
.pw-row{display:flex;gap:8px}
.pw-row input{flex:1}
.danger-btn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--red);background:none;color:var(--red);font-family:var(--font-cond);font-size:15px;font-weight:700;cursor:pointer;text-transform:uppercase}
.empty{padding:60px 20px;text-align:center;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.2}
.empty-text{font-family:var(--font-cond);font-size:18px;font-weight:700;text-transform:uppercase}
.smartly-note{background:var(--accent-dim);border:1px solid rgba(79,70,229,.3);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.7}
.smartly-note strong{color:var(--text)}
.drop-zone{border:2px dashed var(--border2);border-radius:14px;padding:28px;text-align:center;color:var(--text3);font-family:var(--font-cond);font-size:15px;font-weight:700;margin:0 20px 16px;letter-spacing:.04em;cursor:pointer;transition:all .2s}
.drop-zone.drag-over{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-badge">CW</div>
    <div class="login-title">Corpworks Payroll</div>
    <div class="login-sub">Admin access only</div>
    <div class="login-field"><div class="login-label">Username</div><input class="login-input" type="text" id="loginUser" placeholder="admin" autocomplete="username"></div>
    <div class="login-field"><div class="login-label">Password</div><input class="login-input" type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header class="app-bar" id="appBar" style="display:none">
  <div class="bar-top">
    <div class="brand">
      <div class="brand-badge">CW</div>
      <div><div class="brand-name">Corpworks Payroll</div><div class="brand-sub">Admin Dashboard</div></div>
    </div>
    <div class="bar-right">
      <div class="live-time" id="liveTime"></div>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab active" onclick="showPage('review',this)">Review</button>
    <button class="tab" onclick="showPage('approved',this)">Approved</button>
    <button class="tab" onclick="showPage('settings',this)">Settings</button>
  </nav>
</header>

<div class="page active" id="page-review" style="display:none">
  <div class="summary-strip">
    <div class="scard"><div class="scard-val yellow" id="sPending">0</div><div class="scard-lbl">Pending</div></div>
    <div class="scard"><div class="scard-val green" id="sApproved">0</div><div class="scard-lbl">Approved</div></div>
    <div class="scard"><div class="scard-val accent" id="sTotalHrs">0.0</div><div class="scard-lbl">Total hrs</div></div>
    <div class="scard"><div class="scard-val orange" id="sTotalAmt">$0</div><div class="scard-lbl">Total value</div></div>
  </div>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvImport').click()">
    ↓ Drop CSV from timesheet app here — or click to import
    <input type="file" id="csvImport" accept=".csv" style="display:none" onchange="handleFileImport(this)">
  </div>
  <div class="filter-bar">
    <button class="filter-pill active" onclick="setFilter('all',this)">All</button>
    <button class="filter-pill" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-pill" onclick="setFilter('approved',this)">Approved</button>
    <button class="filter-pill" onclick="setFilter('queried',this)">Queried</button>
    <input class="search-input" type="text" id="searchInput" placeholder="Search tech or week..." oninput="renderReview()">
    <button class="export-all-btn" onclick="exportSmartly()">↓ Smartly CSV</button>
  </div>
  <div class="subs-wrap" id="reviewList"></div>
</div>

<div class="page" id="page-approved" style="display:none">
  <div class="payroll-section" id="approvedList"></div>
</div>

<div class="page" id="page-settings" style="display:none">
  <div class="settings-section">
    <div class="setting-card">
      <div class="setting-title">Admin Credentials</div>
      <div class="field-label">Username</div>
      <input class="setting-input" type="text" id="setUser" placeholder="admin">
      <div class="field-label">New password</div>
      <div class="pw-row">
        <input class="setting-input" type="password" id="setPass" placeholder="Enter new password" style="margin-bottom:0">
        <button class="pw-btn" onclick="saveCredentials()">Save</button>
      </div>
    </div>
    <div class="setting-card">
      <div class="setting-title">Technicians</div>
      <div class="chips" id="techChips"></div>
      <div class="add-row">
        <input type="text" id="newTech" placeholder="Add name..." onkeydown="if(event.key==='Enter')addTech()">
        <button onclick="addTech()">Add</button>
      </div>
    </div>
    <div class="setting-card">
      <div class="setting-title">Data</div>
      <button class="danger-btn" onclick="clearApproved()">Clear all approved submissions</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let settings={company:'Corpworks Ltd',techs:['Glenn','Troy','Marco','Monique'],user:'admin',pass:'corpworks2026'};
let submissions=[];
let currentFilter='all';

function loadData(){try{const s=localStorage.getItem('cwp_settings');if(s)settings={...settings,...JSON.parse(s)};const sub=localStorage.getItem('cwp_subs');if(sub)submissions=JSON.parse(sub);}catch(e){}}
function saveData(){localStorage.setItem('cwp_subs',JSON.stringify(submissions));}
function saveSettings(){localStorage.setItem('cwp_settings',JSON.stringify(settings));}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(u===settings.user&&p===settings.pass){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appBar').style.display='block';
    document.querySelectorAll('.page').forEach(pg=>pg.style.display='block');
    showPage('review',document.querySelector('.tab.active'));
    renderAll();
    localStorage.setItem('cwp_session','1');
  }else{document.getElementById('loginError').textContent='Incorrect username or password.';document.getElementById('loginPass').value='';}
}

function doLogout(){
  localStorage.removeItem('cwp_session');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appBar').style.display='none';
  document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');
  document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='approved')renderApproved();
  if(name==='settings')renderSettings();
  if(name==='review')renderReview();
}

function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));btn.classList.add('active');renderReview();}

function handleFileImport(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{const n=importCSV(ev.target.result);showToast(n>0?'Imported '+n+' submission(s) \u2713':'No new submissions found',n>0?'ok':'err');};
  reader.readAsText(file);input.value='';
}

function importCSV(csv){
  const lines=csv.trim().split('\n');if(lines.length<2)return 0;
  const groups={};
  for(let i=1;i<lines.length;i++){
    const cols=parseCSVLine(lines[i]);if(cols.length<5)continue;
    const id=cols[0]&&cols[0].replace(/"/g,'');if(!id)continue;
    if(!groups[id])groups[id]=[];
    groups[id].push(cols);
  }
  let imported=0;
  Object.entries(groups).forEach(([id,rows])=>{
    if(submissions.find(s=>String(s.id)===String(id)))return;
    const r=rows[0];
    const sub={
      id,tech:r[1]&&r[1].replace(/"/g,'')||'Unknown',
      weekStart:r[2]&&r[2].replace(/"/g,'')||'',weekEnd:r[3]&&r[3].replace(/"/g,'')||'',
      submittedAt:r[4]&&r[4].replace(/"/g,'')||new Date().toISOString(),
      clockIn:r[5]&&r[5].replace(/"/g,'')||null,clockOut:r[6]&&r[6].replace(/"/g,'')||null,
      breakMins:parseInt(r[7])||0,
      jobs:rows.map(cols=>({desc:cols[8]&&cols[8].replace(/"/g,'')||'',hours:[9,10,11,12,13,14].map(i=>parseFloat(cols[i])||0),rate:parseFloat(cols[16])||35})),
      status:'pending',adminNotes:'',imported:true
    };
    sub.totalHours=sub.jobs.reduce((t,j)=>t+j.hours.reduce((a,b)=>a+b,0),0);
    sub.totalAmount=sub.jobs.reduce((t,j)=>t+j.hours.reduce((a,b)=>a+b,0)*j.rate,0);
    submissions.unshift(sub);imported++;
  });
  saveData();renderAll();return imported;
}

function parseCSVLine(line){const result=[];let cur='';let inQ=false;for(let i=0;i<line.length;i++){if(line[i]==='"'){inQ=!inQ;}else if(line[i]===','&&!inQ){result.push(cur);cur='';}else cur+=line[i];}result.push(cur);return result;}

function renderReview(){
  updateSummary();
  const search=document.getElementById('searchInput').value.toLowerCase();
  let list=submissions.filter(s=>{
    if(currentFilter!=='all'&&s.status!==currentFilter)return false;
    if(search&&!s.tech.toLowerCase().includes(search)&&!(s.weekStart||'').includes(search))return false;
    return true;
  });
  const wrap=document.getElementById('reviewList');
  if(!list.length){wrap.innerHTML='<div class="empty"><div class="empty-icon">&#128203;</div><div class="empty-text">No submissions — import a CSV from the timesheet app</div></div>';return;}
  wrap.innerHTML=list.map(s=>{
    const initials=s.tech.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const d=new Date(s.submittedAt||Date.now());
    const dateStr=d.toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'});
    const timeStr=d.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
    const jobRows=(s.jobs||[]).map((j,ji)=>{
      const jTot=j.hours.reduce((a,b)=>a+b,0);
      const dayCells=['M','T','W','T','F','S'].map((d,i)=>'<td style="text-align:center"><input class="edit-hrs" type="number" min="0" max="24" step="0.5" value="'+(j.hours[i]||'')+'" placeholder="-" oninput="updateHours(\''+s.id+'\','+ji+','+i+',this.value)"></td>').join('');
      return '<tr><td style="font-size:13px;color:var(--text2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(j.desc||'General labour')+'</td>'+dayCells+'<td style="text-align:right;font-family:var(--font-cond);font-size:16px;font-weight:800;color:var(--accent)">'+jTot.toFixed(1)+'h</td><td style="text-align:center;font-size:12px;color:var(--text2)">$'+j.rate+'</td><td style="text-align:right;font-family:var(--font-cond);font-size:16px;font-weight:800;color:var(--green)">$'+Math.round(jTot*j.rate)+'</td></tr>';
    }).join('');
    const approveBtn=s.status!=='approved'?'<button class="act-btn btn-approve" onclick="approveSubmission(\''+s.id+'\')">Approve</button>':'<button class="act-btn btn-unapprove" onclick="unapproveSubmission(\''+s.id+'\')">Unapprove</button>';
    const queryBtn=s.status!=='queried'?'<button class="act-btn btn-query" onclick="querySubmission(\''+s.id+'\')">Query</button>':'';
    return '<div class="sub-card '+s.status+'" id="sc-'+s.id+'"><div class="sub-head" onclick="toggleCard(\''+s.id+'\')"><div class="sub-head-left"><div class="tech-avatar" style="background:'+techColor(s.tech)+'">'+initials+'</div><div class="sub-info"><div class="sub-tech">'+s.tech+'</div><div class="sub-week">Week '+formatDate(s.weekStart)+' \u2013 '+formatDate(s.weekEnd)+' &nbsp;&middot;&nbsp; Submitted '+dateStr+' '+timeStr+'</div></div></div><div class="sub-head-right"><span class="status-badge badge-'+s.status+'">'+s.status+'</span><span class="chevron">\u25be</span></div></div><div class="sub-body"><div class="sub-stats"><div class="sub-stat"><div class="sub-stat-val">'+(s.totalHours||0).toFixed(1)+'</div><div class="sub-stat-lbl">Hours</div></div><div class="sub-stat"><div class="sub-stat-val green">$'+Math.round(s.totalAmount||0).toLocaleString()+'</div><div class="sub-stat-lbl">Amount</div></div><div class="sub-stat"><div class="sub-stat-val yellow">'+(s.breakMins||0)+'m</div><div class="sub-stat-lbl">Breaks</div></div><div class="sub-stat"><div class="sub-stat-val">'+(s.jobs||[]).length+'</div><div class="sub-stat-lbl">Jobs</div></div></div>'+(s.clockIn?'<div class="clock-row"><div class="clock-item">In: <span>'+s.clockIn+'</span></div><div class="clock-item">Out: <span>'+(s.clockOut||'--:--')+'</span></div><div class="clock-item">Breaks: <span>'+(s.breakMins||0)+' min</span></div></div>':'')+'<table class="jobs-table"><thead><tr><th>Job / Description</th><th style="text-align:center">Mon</th><th style="text-align:center">Tue</th><th style="text-align:center">Wed</th><th style="text-align:center">Thu</th><th style="text-align:center">Fri</th><th style="text-align:center">Sat</th><th style="text-align:right">Total</th><th style="text-align:center">Rate</th><th style="text-align:right">Amt</th></tr></thead><tbody>'+jobRows+'</tbody></table><div class="field-label">Admin notes</div><textarea class="admin-notes" placeholder="Payroll comments, queries, adjustments..." oninput="updateNotes(\''+s.id+'\',this.value)">'+(s.adminNotes||'')+'</textarea><div class="action-row">'+approveBtn+queryBtn+'<button class="act-btn btn-secondary" onclick="exportOne(\''+s.id+'\')">CSV</button><button class="act-btn btn-danger" onclick="deleteSubmission(\''+s.id+'\')">Delete</button></div></div></div>';
  }).join('');
}

function toggleCard(id){const c=document.getElementById('sc-'+id);c.classList.toggle('open');}
function updateHours(id,ji,di,val){const s=submissions.find(s=>String(s.id)===String(id));if(!s)return;s.jobs[ji].hours[di]=parseFloat(val)||0;recalc(s);saveData();updateSummary();}
function updateNotes(id,val){const s=submissions.find(s=>String(s.id)===String(id));if(!s)return;s.adminNotes=val;saveData();}
function recalc(s){s.totalHours=s.jobs.reduce((t,j)=>t+j.hours.reduce((a,b)=>a+b,0),0);s.totalAmount=s.jobs.reduce((t,j)=>t+j.hours.reduce((a,b)=>a+b,0)*j.rate,0);}
function approveSubmission(id){const s=submissions.find(s=>String(s.id)===String(id));if(!s)return;s.status='approved';s.approvedAt=new Date().toISOString();saveData();renderReview();showToast('Approved \u2713','ok');}
function unapproveSubmission(id){const s=submissions.find(s=>String(s.id)===String(id));if(!s)return;s.status='pending';delete s.approvedAt;saveData();renderReview();showToast('Moved back to pending');}
function querySubmission(id){const s=submissions.find(s=>String(s.id)===String(id));if(!s)return;s.status='queried';saveData();renderReview();showToast('Marked as queried');}
function deleteSubmission(id){if(!confirm('Delete this submission?'))return;submissions=submissions.filter(s=>String(s.id)!==String(id));saveData();renderReview();showToast('Deleted');}
function updateSummary(){
  const p=submissions.filter(s=>s.status==='pending').length;
  const a=submissions.filter(s=>s.status==='approved').length;
  const h=submissions.reduce((t,s)=>t+(s.totalHours||0),0);
  const m=submissions.reduce((t,s)=>t+(s.totalAmount||0),0);
  document.getElementById('sPending').textContent=p;document.getElementById('sApproved').textContent=a;document.getElementById('sTotalHrs').textContent=h.toFixed(1);document.getElementById('sTotalAmt').textContent='$'+Math.round(m).toLocaleString();
}

function renderApproved(){
  const approved=submissions.filter(s=>s.status==='approved');
  const wrap=document.getElementById('approvedList');
  if(!approved.length){wrap.innerHTML='<div class="empty"><div class="empty-icon">&#9989;</div><div class="empty-text">No approved timesheets yet</div></div>';return;}
  const byWeek={};approved.forEach(s=>{const k=s.weekStart||'Unknown';if(!byWeek[k])byWeek[k]=[];byWeek[k].push(s);});
  wrap.innerHTML='<div class="smartly-note"><strong>Smartly:</strong> Click export below, then in Smartly go to <strong>Payroll &rarr; Import &rarr; Timesheets</strong> and upload the CSV file.</div><button class="export-all-btn" onclick="exportSmartly()" style="margin-bottom:20px;padding:12px 24px;font-size:15px;border-radius:12px">\u2193 Export Approved to Smartly CSV</button>'+Object.entries(byWeek).sort((a,b)=>b[0].localeCompare(a[0])).map(([week,subs])=>'<div class="payroll-week"><div class="payroll-week-title">Week of '+formatDate(week)+'</div>'+subs.map(s=>'<div class="payroll-row"><div><div class="payroll-tech">'+s.tech+'</div><div class="payroll-meta">Approved '+(s.approvedAt?new Date(s.approvedAt).toLocaleDateString('en-NZ',{day:'2-digit',month:'short'}):'--')+' &middot; '+(s.jobs||[]).length+' jobs</div></div><div style="display:flex;gap:20px;align-items:center"><div class="payroll-hrs">'+(s.totalHours||0).toFixed(1)+'h</div><div class="payroll-amt">$'+Math.round(s.totalAmount||0).toLocaleString()+'</div></div></div>').join('')+'</div>').join('');
}

function exportOne(id){const s=submissions.find(s=>String(s.id)===String(id));if(!s)return;dl(buildCSV([s]),'timesheet-'+s.tech.replace(/\s+/g,'-').toLowerCase()+'-'+s.weekStart+'.csv','text/csv');showToast('CSV downloaded','ok');}
function exportSmartly(){
  const approved=submissions.filter(s=>s.status==='approved');
  if(!approved.length){showToast('No approved timesheets','err');return;}
  const rows=[['Employee Name','Week Start','Week End','Description','Hours','Rate ($/hr)','Amount (NZD)','Admin Notes','Clock In','Clock Out','Break (min)']];
  approved.forEach(s=>s.jobs.forEach(j=>{const h=j.hours.reduce((a,b)=>a+b,0);if(h===0)return;rows.push([s.tech,s.weekStart,s.weekEnd,j.desc||'General Labour',h.toFixed(2),j.rate.toFixed(2),(h*j.rate).toFixed(2),s.adminNotes||'',s.clockIn||'',s.clockOut||'',s.breakMins||0]);}));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  dl(csv,'corpworks-smartly-payroll-'+new Date().toISOString().split('T')[0]+'.csv','text/csv');
  showToast('Exported '+approved.length+' timesheet(s)','ok');
}
function buildCSV(subs){const rows=[['ID','Tech','Week Start','Week End','Submitted','Clock In','Clock Out','Break (min)','Description','Mon','Tue','Wed','Thu','Fri','Sat','Total Hours','Rate','Amount']];subs.forEach(s=>s.jobs.forEach(j=>{const h=j.hours.reduce((a,b)=>a+b,0);rows.push([s.id,s.tech,s.weekStart,s.weekEnd,s.submittedAt,s.clockIn||'',s.clockOut||'',s.breakMins||0,j.desc,...j.hours,h.toFixed(1),j.rate,(h*j.rate).toFixed(2)]);}));return rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');}
function dl(content,name,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}

function renderSettings(){document.getElementById('setUser').value=settings.user;renderChips();}
function renderChips(){document.getElementById('techChips').innerHTML=settings.techs.map(t=>'<div class="chip">'+t+'<button onclick="removeTech(\''+t+'\')">x</button></div>').join('');}
function addTech(){const inp=document.getElementById('newTech');const n=inp.value.trim();if(!n)return;if(settings.techs.includes(n)){showToast('Already in list','err');return;}settings.techs.push(n);inp.value='';saveSettings();renderChips();}
function removeTech(n){settings.techs=settings.techs.filter(t=>t!==n);saveSettings();renderChips();}
function saveCredentials(){const u=document.getElementById('setUser').value.trim();const p=document.getElementById('setPass').value;if(u)settings.user=u;if(p)settings.pass=p;saveSettings();showToast('Credentials saved \u2713','ok');}
function clearApproved(){if(!confirm('Remove all approved?'))return;submissions=submissions.filter(s=>s.status!=='approved');saveData();renderApproved();renderReview();showToast('Cleared');}
function formatDate(str){if(!str)return '--';const d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-NZ',{day:'2-digit',month:'short',year:'numeric'});}
function techColor(name){const colors=['#4f46e5','#0891b2','#059669','#d97706','#dc2626','#7c3aed','#db2777'];let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))%1000;return colors[Math.abs(h)%colors.length];}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');setTimeout(()=>t.classList.remove('show'),2500);}
function renderAll(){renderReview();updateSummary();}

// Drag and drop CSV
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');const file=e.dataTransfer.files[0];if(!file||!file.name.endsWith('.csv')){showToast('Drop a CSV file from the timesheet app','err');return;}const reader=new FileReader();reader.onload=ev=>{const n=importCSV(ev.target.result);showToast(n>0?'Imported '+n+' submission(s) \u2713':'No new submissions found',n>0?'ok':'err');};reader.readAsText(file);});

setInterval(()=>{const d=new Date();document.getElementById('liveTime').textContent=d.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:true});},1000);

loadData();
if(localStorage.getItem('cwp_session')){document.getElementById('loginScreen').style.display='none';document.getElementById('appBar').style.display='block';document.querySelectorAll('.page').forEach(pg=>pg.style.display='block');showPage('review',document.querySelector('.tab'));renderAll();}
</script>
</body>
</html>
